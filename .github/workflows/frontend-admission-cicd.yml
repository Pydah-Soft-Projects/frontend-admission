# Frontend Admission CI/CD Pipeline
# For Next.js frontend repo. Runs on every push/PR to main|master.

name: Frontend Admission CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm install

      - name: Build application
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Create Deployment Bundle
        run: |
          # Bundle only the production-required files
          # Note: ecosystem.config.cjs is included only if it exists
          FILES=".next public package.json package-lock.json next.config.ts"
          [ -f ecosystem.config.cjs ] && FILES="$FILES ecosystem.config.cjs"
          tar -czf deploy.tar.gz $FILES

      - name: Upload Bundle to Server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp deploy.tar.gz "$SSH_USER@$SSH_HOST:/tmp/deploy.tar.gz"

      - name: Deploy and Extract Bundle
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "set -e; \
            # 1. Stop app to release locks
            sudo fuser -k 3000/tcp || true; \
            # 2. Ensure target path exists and clean it up partially (excluding .env)
            sudo mkdir -p $DEPLOY_PATH; \
            sudo chown $SSH_USER:$SSH_USER $DEPLOY_PATH; \
            # 3. Extract bundle using sudo (overwrites everything)
            sudo tar -xzf /tmp/deploy.tar.gz -C $DEPLOY_PATH; \
            # 4. Correct ownership
            sudo chown -R $SSH_USER:$SSH_USER $DEPLOY_PATH; \
            # 5. Production setup
            cd $DEPLOY_PATH && \
            npm install --production && \
            if [ -f ecosystem.config.cjs ]; then
              pm2 restart ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            else
              pm2 restart '$PM2_APP_NAME' --update-env || pm2 start npm --name '$PM2_APP_NAME' -- start
            fi && \
            sudo systemctl reload nginx && \
            pm2 save && \
            rm /tmp/deploy.tar.gz && \
            echo 'Deployment finalized successfully.'"

      - name: Verify deployment (smoke test)
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          if [ -n "$FRONTEND_URL" ]; then
            sleep 10
            curl -sf "$FRONTEND_URL" && echo "Frontend is UP" || (echo "::warning::Frontend might be down" && exit 1)
          else
            echo "Skipping smoke test (set FRONTEND_URL secret for post-deploy verification)"
          fi
